name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Trigger Render API deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_API != '' }}
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Trigger Render Worker deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_WORKER != '' }}
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}"
