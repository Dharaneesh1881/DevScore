services:
  api:
    build: ./backend
    command: node index.js
    ports:
      - "3001:3001"
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongo:27017/devscore_master
    depends_on:
      - redis
      - mongo
    restart: unless-stopped

  worker:
    build: ./backend
    command: node worker/index.js
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongo:27017/devscore_master
    depends_on:
      - redis
      - mongo
    shm_size: "256m"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
