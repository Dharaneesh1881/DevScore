services:
  # ── 1. API Server (Express + Socket.IO) ──────────────────────────────────
  - type: web
    name: webeval-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # paste in Render dashboard
      - key: REDIS_URL
        sync: false          # paste Upstash Redis URL
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false          # your Vercel URL, e.g. https://webeval.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PLATFORM_ADMIN_EMAIL
        sync: false          # e.g. admin@devscore.io
      - key: PLATFORM_ADMIN_PASSWORD
        sync: false          # strong password for platform admin login
      - key: PLATFORM_ADMIN_NAME
        sync: false          # e.g. Platform Admin

  # ── 2. Evaluation Worker (BullMQ + Puppeteer) ────────────────────────────
  - type: web
    name: webeval-worker
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && PUPPETEER_CACHE_DIR=/opt/render/.cache/puppeteer npx puppeteer browsers install chrome
    startCommand: node worker/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
